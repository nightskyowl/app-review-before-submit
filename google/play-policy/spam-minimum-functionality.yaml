_meta:
  platform: "google"
  category: "spam-minimum-functionality"
  source_url: "https://support.google.com/googleplay/android-developer/answer/9898685" # Using the general known base
  section_id: "spam-minimum-functionality"
  last_verified: "2026-03-09"
  last_changed: "2026-03-09"
  severity_if_violated: "rejection"
  version: "2026-03"

rules:
  - id: "google-spam-1"
    title: "Repetitive Content and Spam"
    summary: >
      Apps must not be repetitive or highly similar to other apps already on Google Play by the same 
      developer. Apps that are generated by an automated tool or wizard and submitted in mass quantities 
      are prohibited.
    check_criteria:
      - "Does the app offer a distinct, unique experience compared to other apps submitted by the same developer account?"
    code_signals:
      - "N/A - Review of developer's App Store Connect / Play Console portfolio for copy-paste apps containing minor reskinning."
    common_violations:
      - "Rejection for publishing 50 separate variations of a generic 'Flashlight' app under the same developer account."
      - "Using an automated service to mass-publish identical apps for 100 different local restaurants."
    platform_specific: {}
    related_rules:
      - "apple-4.3"
      - "apple-4.2.6"
    notes: "Developers should consolidate similar content into a single app whenever possible."

  - id: "google-spam-2"
    title: "Webviews and Affiliate Traffic"
    summary: >
      Apps whose primary purpose is to drive affiliate traffic to a website, or that merely provide 
      a web view of a website without proper permission or added value, are not allowed.
    check_criteria:
      - "Does the app provide functionality beyond just a basic `<WebView>` wrapper of an existing website?"
      - "If the app is a web wrapper, does the developer actually own or have verifiable permission to wrap that website?"
    code_signals:
      - "Search for a single `WebView` occupying the entire `Activity` layout with no native navigation components."
    common_violations:
      - "Rejection for building an app that just loads an Amazon affiliate link in a webview."
      - "Wrapping a popular public news site's mobile webpage without authorization."
    platform_specific: {}
    related_rules:
      - "apple-4.2"
    notes: "Adding a native toolbar to a wrapped website is often insufficient; true native utility is expected."

  - id: "google-spam-3"
    title: "Broken Functionality"
    summary: >
      Apps must provide a stable and responsive user experience. Apps that crash, force close, 
      freeze, or otherwise function abnormally (like failing to install or load) are prohibited.
    check_criteria:
      - "Does the app install, load, and run without repeatedly crashing or freezing on standard physical devices?"
      - "Are all fatal exceptions handled and basic UI flows responsive?"
    code_signals:
      - "Check `Logcat` for recurrent `NullPointerException` or `ANR` (Application Not Responding) errors on launch."
    common_violations:
      - "Rejection for an app crashing immediately upon opening due to an unhandled security exception on Android 14."
      - "An app freezing indefinitely on a splash screen while attempting to make a failed network call without a timeout."
    platform_specific: {}
    related_rules:
      - "apple-2.1"
    notes: "Apps are regularly removed if their vitals drop below acceptable crash/ANR thresholds."

  - id: "google-spam-4"
    title: "Limited Functionality and Content"
    summary: >
      Apps must offer basic utility and an engaging user experience. Static apps with limited content 
      (like a text-only document, PDF, or a single wallpaper) are not permitted on Google Play.
    check_criteria:
      - "Does the app have sufficient dynamic content or interactive functionality beyond a static scrollable document?"
      - "Is the app designed to actually perform a function, rather than serving as an empty shell or 'do nothing' prank?"
    code_signals:
      - "Search for apps consisting only of a single `TextView` reading a large static string from `res/raw/`."
    common_violations:
      - "Rejection for an app consisting solely of 5 static images of cars and no interactive elements."
      - "A 'prank' app that explicitly states 'This app does absolutely nothing' and displays a blank screen."
    platform_specific: {}
    related_rules:
      - "apple-4.2"
    notes: "Standalone guides or manuals are often rejected unless they are highly interactive and robust."
